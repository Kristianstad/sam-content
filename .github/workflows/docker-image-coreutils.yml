name: Create and publish coreutils

on:
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine version (e.g. 3.23)'
        required: true
        default: '3.23'
      app_version:
        description: 'Application version / tag (e.g. coreutils-9.11)'
        required: false
      image_name:
        description: 'Image name (e.g. sam-content)'
        required: true
        default: 'sam-content'

env:
  REGISTRY: ghcr.io
  CONTEXT: coreutils
  OWNER: kristianstad

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine versions
        id: version
        run: |
          ALPINE_VER=${{ inputs.alpine_version }}
          APP_VER=${{ inputs.app_version || github.ref_name }}
          echo "alpine_version=${ALPINE_VER}" >> $GITHUB_OUTPUT
          echo "app_version=${APP_VER}" >> $GITHUB_OUTPUT
          echo "Building varnish ${APP_VER} on Alpine ${ALPINE_VER}"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.app_version }}
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.30.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.CONTEXT }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SaM_REPO=${{ env.REGISTRY }}/${{ env.OWNER }}/secure_and_minimal
            ALPINE_VERSION=${{ steps.version.outputs.alpine_version }}
            APP_VERSION=${{ steps.version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
